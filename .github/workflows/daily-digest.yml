name: Daily AI Builders Digest

on:
  schedule:
    # 每天早上 08:00 (Asia/Shanghai) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Daily Digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "Generating digest..."
          # 运行本地生成脚本，指定输出目录到 Astro 的内容目录
          node scripts/run-local-digest.js \
            --generator-cmd "node scripts/deepseek-generator.js" \
            --content-dir src/content/posts \
            --generated-dir src/data/api \
            --draft-dir drafts \
            --archive-dir archive \
            --publish-policy auto_publish

      - name: Format Frontmatter
        run: |
          # 确保生成的 Markdown 文件带有正确的 Astro Frontmatter
          node -e '
          const fs = require("fs");
          const path = require("path");
          const dir = "src/content/posts";
          if (!fs.existsSync(dir)) return;
          const files = fs.readdirSync(dir);
          for (const file of files) {
            if (!file.endsWith(".md")) continue;
            const p = path.join(dir, file);
            let content = fs.readFileSync(p, "utf8");
            if (!content.startsWith("---")) {
              const date = file.replace(".md", "");
              content = `---\ntitle: "${date} — AI Builders 早报"\ndate: ${date}\n---\n${content}`;
              fs.writeFileSync(p, content);
            }
          }
          '

      - name: Commit new digest
        run: |
          # 运行 build-api.js 更新索引
          node scripts/build-api.js
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add src/content/posts/ src/data/api/ archive/ drafts/ generated/
          git commit -m "chore: add daily digest for $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push

      - name: Build Astro site
        run: npm run build

      - name: Deploy to Tencent Cloud COS
        uses: tencentcloud/cos-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_SECRET_KEY }}
          cos_bucket: ${{ secrets.TENCENT_BUCKET }}
          cos_region: ${{ secrets.TENCENT_REGION }}
          local_path: 'dist'
          remote_path: '/'
          clean: false
