name: Daily AI Builders Digest

on:
  schedule:
    # 每天早上 08:00 (Asia/Shanghai) = 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai # 强制使用北京时间
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Daily Digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WECOM_WEBHOOK_URL: ${{ secrets.WECOM_WEBHOOK_URL }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
          COS_STORAGE_CLASS: ${{ secrets.COS_STORAGE_CLASS }}
          TENCENTCLOUD_SECRET_ID: ${{ secrets.TENCENTCLOUD_SECRET_ID }}
          TENCENTCLOUD_SECRET_KEY: ${{ secrets.TENCENTCLOUD_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "❌ 错误：在 GitHub Actions 环境中未读取到 DEEPSEEK_API_KEY！"
            echo "请检查：1. 是否在 Secrets 中配置了该变量？(不要配成 Variables)"
            echo "2. 变量名是否拼写正确？(必须完全是 DEEPSEEK_API_KEY，不能有空格)"
            exit 1
          else
            echo "✅ 成功读取到 DEEPSEEK_API_KEY (长度: ${#DEEPSEEK_API_KEY})"
          fi
          
          echo "Generating digest and pushing to WeCom..."
          node scripts/workflows/auto-publish-today.js \
            --generator-cmd "node scripts/deepseek-generator.js" \
            --content-dir src/content/posts \
            --generated-dir src/data/api \
            --draft-dir drafts \
            --archive-dir archive

      - name: Format Frontmatter
        run: |
          # 确保生成的 Markdown 文件带有正确的 Astro Frontmatter
          node -e '
          const fs = require("fs");
          const path = require("path");
          const dir = "src/content/posts";
          if (fs.existsSync(dir)) {
            const files = fs.readdirSync(dir);
            for (const file of files) {
              if (!file.endsWith(".md")) continue;
              const p = path.join(dir, file);
              let content = fs.readFileSync(p, "utf8");
              if (!content.startsWith("---")) {
                const date = file.replace(".md", "");
                content = `---\ntitle: "${date} — AI Builders 早报"\ndate: ${date}\n---\n${content}`;
                fs.writeFileSync(p, content);
              }
            }
          }
          '

      - name: Commit new digest
        run: |
          # 运行 build-api.js 更新索引
          node scripts/build-api.js
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # 只 add 确实存在的目录，避免报错
          [ -d "src/content/posts" ] && git add src/content/posts/
          [ -d "src/data/api" ] && git add src/data/api/
          [ -d "archive" ] && git add archive/
          [ -d "drafts" ] && git add drafts/
          [ -d "generated" ] && git add generated/
          
          git commit -m "chore: add daily digest for $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push

      - name: Build Astro site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy-pages:
    needs: generate-and-deploy
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
